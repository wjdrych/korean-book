<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>110쪽 · 밤에 일찍 자면 돼.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#2b2b2b; --line:#cfcfcf; --ghost:#f2c5bb;
    --accent:#f2705c; --accent2:#17a2b8; --warn:#c0392b;
    --paper:#ffffff; --bg:#fdf0ed; --soft:#ffe8e3;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{margin:0;background:var(--bg);font-family:'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif;color:var(--ink);padding:18px 10px 60px;}
  .sheet{max-width:820px;margin:0 auto;background:var(--paper);border:1px solid #ddd;border-radius:16px;box-shadow:0 8px 28px rgba(0,0,0,.08);overflow:hidden;}
  .topbar{display:flex;justify-content:space-between;align-items:center;padding:10px 18px;font-size:13px;color:#888;border-bottom:1px solid #eee;}
  .who{display:flex;align-items:center;gap:8px;}
  .who .label{color:#888;}
  .who .student-name{font-weight:700;color:var(--accent);font-size:15px;}
  .who button{border:1px solid #ccc;background:#fff;border-radius:14px;padding:3px 10px;font-size:12px;cursor:pointer;color:#666;}
  h1{text-align:center;font-size:28px;font-weight:800;margin:18px 16px 6px;letter-spacing:1px;}

  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:200;}
  .modal{background:#fff;border-radius:18px;padding:28px 26px;width:min(360px,90vw);text-align:center;box-shadow:0 12px 40px rgba(0,0,0,.25);}
  .modal h3{margin:0 0 6px;font-size:22px;}
  .modal p{margin:0 0 16px;font-size:14px;color:#777;}
  .modal input{width:100%;border:2px solid var(--accent);border-radius:12px;padding:12px;font-size:18px;text-align:center;outline:none;font-family:inherit;}
  .modal button{margin-top:16px;border:none;background:var(--accent);color:#fff;border-radius:24px;padding:12px 30px;font-size:16px;font-weight:700;cursor:pointer;}
  .modal .err{color:var(--warn);font-size:13px;min-height:18px;margin-top:6px;}

  .scoreboard{display:flex;align-items:center;gap:14px;justify-content:center;flex-wrap:wrap;padding:6px 16px 10px;}
  .badge-pill{background:#fff;border:2px solid var(--accent2);border-radius:24px;padding:6px 16px;display:flex;align-items:center;gap:8px;}
  .badge-emoji{font-size:24px;line-height:1;}
  .badge-name{font-size:16px;font-weight:700;color:var(--accent2);}
  .badge-next{font-size:12px;color:#999;}
  .badge-pop{animation:badgePop .6s ease;}
  @keyframes badgePop{0%{transform:scale(1)}40%{transform:scale(1.35)}100%{transform:scale(1)}}
  .page-arrow{position:fixed;top:50%;transform:translateY(-50%);z-index:60;border:none;cursor:pointer;
    width:46px;height:78px;font-size:34px;color:#fff;background:rgba(242,112,92,.82);display:flex;align-items:center;justify-content:center;}
  .page-arrow.left{left:0;border-radius:0 14px 14px 0;}
  .page-arrow.right{right:0;border-radius:14px 0 0 14px;}
  .page-arrow:hover{background:rgba(242,112,92,1);}
  .page-arrow.disabled{background:rgba(180,180,180,.55);cursor:not-allowed;}
  @media print{ .page-arrow{display:none!important;} }
  @media (max-width:520px){ .page-arrow{width:38px;height:64px;font-size:28px;} }
  .quiz-area{text-align:center;}
  .quiz-q{font-size:18px;font-weight:700;margin:6px 0 10px;}
  .quiz-clock img{width:180px;height:180px;border:1px solid #eee;border-radius:14px;background:#fff;}
  .quiz-choices{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:14px 0;}
  .quiz-choices button{border:2px solid var(--accent);background:#fff;color:var(--accent);border-radius:24px;
    padding:12px 22px;font-size:20px;font-weight:700;cursor:pointer;transition:.15s;min-width:90px;}
  .quiz-choices button:hover{background:var(--accent);color:#fff;}
  .quiz-choices button.correct{background:var(--accent2);border-color:var(--accent2);color:#fff;}
  .quiz-choices button.wrong{background:var(--warn);border-color:var(--warn);color:#fff;}
  .quiz-choices button:disabled{cursor:default;}
  .progress-wrap{flex:1;max-width:300px;height:12px;background:#e9e9e9;border-radius:8px;overflow:hidden;}
  .progress{height:100%;width:0;background:linear-gradient(90deg,var(--accent2),var(--accent));transition:width .4s;}

  .cheer{margin:4px 16px 6px;background:var(--soft);border:1px solid #f7cabf;border-radius:14px;
         padding:12px 16px;text-align:center;font-size:16px;color:#a83c28;min-height:22px;transition:.2s;display:none;}
  .cheer.show{display:block;}
  .cheer .hint{display:block;margin-top:6px;font-size:14px;color:#a9852b;}

  .clocks{padding:6px 18px 2px;}
  .clocks img{width:100%;display:block;margin:6px auto;border-radius:8px;}

  .words{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;padding:14px 16px 6px;}
  .chip{display:inline-flex;align-items:center;gap:6px;border:2px solid var(--accent);background:#fff;color:var(--accent);
        border-radius:24px;padding:8px 16px;font-size:20px;font-weight:700;cursor:pointer;transition:.15s;user-select:none;position:relative;white-space:normal;max-width:100%;text-align:center;line-height:1.3;}
  .chip:hover{background:var(--accent);color:#fff;}
  .chip.active{background:var(--accent);color:#fff;}
  .chip .ico{font-size:16px;}
  .chip .badge{position:absolute;top:-8px;right:-8px;background:var(--accent2);color:#fff;border-radius:50%;
        width:22px;height:22px;font-size:12px;display:none;align-items:center;justify-content:center;}
  .chip.cleared .badge{display:flex;}

  .hint-line{text-align:center;font-size:13px;color:#999;padding:2px 0 8px;}

  .panel{margin:10px 16px 18px;border:1px solid #e6e6e6;border-radius:14px;padding:16px;background:#fbfcfe;}
  .panel h2{margin:0 0 4px;font-size:20px;text-align:center;}
  .panel .target{text-align:center;font-size:15px;color:#666;margin-bottom:12px;}

  .tabs{display:flex;gap:8px;justify-content:center;margin-bottom:14px;}
  .tabs button{border:1px solid var(--accent);background:#fff;color:var(--accent);border-radius:20px;padding:7px 16px;font-size:14px;cursor:pointer;}
  .tabs button.on{background:var(--accent);color:#fff;}

  .count-badge{text-align:center;font-size:16px;margin:6px 0 12px;color:#444;}
  .count-badge b{color:var(--accent2);font-size:20px;}

  .speak-area{text-align:center;}
  .big-btn{border:none;border-radius:30px;padding:14px 28px;font-size:18px;font-weight:700;color:#fff;cursor:pointer;margin:6px;}
  .btn-listen{background:var(--accent);}
  .btn-mic{background:var(--accent2);}
  .btn-mic.rec{background:var(--warn);animation:pulse 1s infinite;}
  @keyframes pulse{0%{opacity:1}50%{opacity:.55}100%{opacity:1}}
  .heard{min-height:26px;font-size:16px;color:#555;margin:10px 0;}
  .verdict{font-size:60px;height:70px;line-height:70px;transition:.1s;}
  .verdict.o{color:var(--accent2);}
  .verdict.x{color:var(--warn);}

  .reps{display:flex;gap:5px;justify-content:center;flex-wrap:wrap;margin:12px 0;}
  .rep-dot{width:24px;height:24px;border-radius:50%;background:#e3e3e3;display:flex;align-items:center;justify-content:center;font-size:12px;color:#888;transition:.2s;}
  .rep-dot.done{background:var(--accent2);color:#fff;transform:scale(1.05);}
  .rep-dot.miss{background:var(--warn);color:#fff;transform:scale(1.05);}

  .write-area{text-align:center;}
  .canvas-row{display:flex;gap:8px 12px;justify-content:center;flex-wrap:wrap;align-items:flex-start;}
  .word-group{display:inline-flex;gap:6px;flex-wrap:wrap;max-width:100%;justify-content:center;align-items:flex-start;}
  .space-cell{flex:0 0 auto;align-self:stretch;}
  .cell-wrap{display:flex;flex-direction:column;align-items:center;gap:3px;}
  .cell-erase{border:none;background:none;color:#444;line-height:1;padding:2px 4px;cursor:pointer;}
  .cell-erase:hover{opacity:0.6;}
  .cell-wrap .ghostchar{font-size:11px;color:#aaa;white-space:nowrap;}
  canvas.pad{border:2px dashed var(--line);border-radius:10px;background:#fff;touch-action:none;}
  .write-tools{margin-top:12px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}
  .write-tools button{border:1px solid #bbb;background:#fff;border-radius:18px;padding:8px 14px;font-size:13px;cursor:pointer;}
  .stroke-row{display:flex;gap:6px;justify-content:center;flex-wrap:nowrap;margin:6px 0 4px;}
  .stroke-box{display:flex;flex-direction:column;align-items:center;gap:3px;}
  .stroke-box canvas{border:1px solid #e3e3e3;border-radius:10px;background:#fff;width:62px;height:62px;}
  .stroke-box .lbl{font-size:12px;color:#888;font-family:'Noto Serif KR','AppleMyungjo','Nanum Myeongjo','Batang',serif;}
  .stroke-space{flex:0 0 auto;width:24px;}
  @media (max-width:560px){ .canvas-row,.stroke-row{overflow-x:auto;justify-content:flex-start;padding-bottom:4px;} }
  .stroke-ctrl{display:flex;gap:8px;justify-content:center;margin:6px 0 10px;}
  .stroke-ctrl button{border:1px solid var(--accent);background:#fff;color:var(--accent);border-radius:18px;padding:7px 16px;font-size:13px;cursor:pointer;}
  .stroke-ctrl button:hover{background:var(--accent);color:#fff;}


  .toast{position:fixed;left:50%;top:24%;transform:translateX(-50%);background:rgba(0,0,0,.86);color:#fff;
         padding:16px 26px;border-radius:14px;font-size:20px;z-index:99;opacity:0;pointer-events:none;transition:.25s;text-align:center;white-space:pre-line;}
  .toast.show{opacity:1;}
  .confetti{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:90;}

  .footer{text-align:center;font-size:12px;color:#aaa;padding:8px 0 16px;}
  @media print{ .words,.panel,.tabs,.scoreboard,.cheer,.modal-bg{display:none!important;} }

  /* QR (인쇄 교재용) */
  .page-qr{position:absolute;top:10px;right:14px;z-index:5;text-align:center;
    background:#fff;border:1px solid #e6e6e6;border-radius:8px;padding:6px 6px 4px;
    box-shadow:0 2px 8px rgba(0,0,0,.06);}
  .page-qr canvas{width:70px;height:70px;image-rendering:pixelated;display:block;}
  .page-qr .cap{font-size:9px;color:#999;margin-top:2px;letter-spacing:.2px;}
  .sheet{position:relative;}
  @media (max-width:520px){ .page-qr{top:6px;right:8px;} .page-qr canvas{width:54px;height:54px;} }
  @media print{ .page-qr{box-shadow:none;} }

.quiz-steps{display:flex;gap:8px;justify-content:center;margin:4px 0 14px;flex-wrap:wrap;}
.qstep{font-size:13px;color:#9aa6bd;background:#eef2f8;border-radius:20px;padding:5px 12px;font-weight:700;}
.qstep.on{background:#f2705c;color:#fff;}
.qstep.cleared{background:#3fbf7f;color:#fff;}
.quiz-intro{font-size:16px;color:#3a4a6b;text-align:center;margin:6px 6px 14px;line-height:1.5;}
.quiz-status{text-align:center;font-size:16px;color:#3a4a6b;margin:14px 0 4px;min-height:24px;font-weight:700;}
.quiz-done-msg{text-align:center;font-size:20px;color:#2a8a5a;font-weight:800;margin:10px 0;}
.retry-btn{display:block;margin:14px auto 0;padding:10px 26px;border:none;border-radius:28px;background:#f2705c;color:#fff;font-size:16px;font-weight:700;cursor:pointer;}
.retry-btn:hover{background:#2f6ac0;}
.card{border:3px solid #d7e0ee;border-radius:14px;background:#fff;cursor:pointer;transition:transform .12s,border-color .15s,box-shadow .15s;display:flex;align-items:center;justify-content:center;user-select:none;-webkit-tap-highlight-color:transparent;}
.card.sel{border-color:#f2705c;box-shadow:0 0 0 4px rgba(242,112,92,.18);transform:scale(1.04);}
.card.done{border-color:#3fbf7f;background:#eafaf1;cursor:default;opacity:.95;}
.card.wrong{animation:qshake .4s;border-color:#e2574c;}
@keyframes qshake{0%,100%{transform:translateX(0)}20%{transform:translateX(-7px)}40%{transform:translateX(7px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
.match-updown{display:flex;flex-direction:column;gap:10px;}
.mu-label{font-size:14px;color:#6b7894;font-weight:700;text-align:center;}
.mu-row{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;}
.mw-card{min-width:96px;height:60px;font-size:22px;font-weight:800;color:#2b3a59;padding:0 10px;}
.mw-card.done{color:#2a8a5a;}
/* 그림 카드: 잘림 없이 contain, 크게 */
.mp-card{width:130px;min-height:130px;height:auto;padding:8px;align-items:center;}
.mp-card img{width:100%;height:auto;display:block;object-fit:contain;pointer-events:none;}
.mc-prompt{text-align:center;font-size:16px;color:#3a4a6b;font-weight:700;margin:4px 0 12px;}
.mc-img{display:flex;justify-content:center;margin-bottom:14px;}
.mc-img img{width:100%;max-width:230px;height:auto;display:block;object-fit:contain;border:3px solid #e3e9f3;border-radius:16px;background:#fff;padding:10px;box-sizing:border-box;}
.mc-opts{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
.mc-opt{min-width:96px;padding:13px 16px;font-size:19px;font-weight:800;color:#2b3a59;background:#fff;border:3px solid #d7e0ee;border-radius:14px;cursor:pointer;transition:transform .1s,border-color .15s,background .15s;}
.mc-opt:hover{border-color:#9bb4e0;}
.mc-opt.correct{border-color:#3fbf7f;background:#eafaf1;color:#2a8a5a;}
.mc-opt.wrong{border-color:#e2574c;background:#fdecea;color:#c0392b;animation:qshake .4s;}
.mc-opt:disabled{cursor:default;}
.mc-feedback{text-align:center;font-size:16px;font-weight:700;margin-top:14px;min-height:24px;}
.mc-next{display:block;margin:12px auto 0;padding:9px 24px;border:none;border-radius:24px;background:#f2705c;color:#fff;font-size:15px;font-weight:700;cursor:pointer;}
/* 첫화면 일러스트 띠: 잘림 없이 */
.count-strip{width:100%;max-width:100%;height:auto;display:block;border:1px solid #eee;border-radius:12px;}
.illus img{width:100%;height:auto;}

</style>
</head>
<body>
  <button class="page-arrow left" id="prevBtn" onclick="goPage(-1)" title="이전 쪽">‹</button>
  <button class="page-arrow right" id="nextBtn" onclick="goPage(1)" title="다음 쪽">›</button>

  <div class="modal-bg" id="nameModal">
    <div class="modal">
      <h3>이름을 알려주세요 😊</h3>
      <p>누가 공부했는지 선생님이 알 수 있어요.</p>
      <input id="nameInput" type="text" placeholder="이름 (예: 김하늘)" maxlength="20" autocomplete="off">
      <div class="err" id="nameErr"></div>
      <button onclick="saveName()">공부 시작하기</button>
    </div>
  </div>

  <div class="sheet">
    <div class="topbar">
      <span>110쪽 · K-STEP 신속 한국어 교재</span>
      <span class="who">
        <span class="label">이름:</span>
        <span class="student-name" id="nameDisplay">-</span>
        <button onclick="openNameModal()">변경</button>
      </span>
    </div>
    <div class="page-qr" id="pageQr" style="display:none;">
      <canvas id="pageQrCanvas"></canvas>
      <div class="cap" id="pageQrCap"></div>
    </div>
    <h1>밤에 일찍 자면 돼.</h1>

    <div class="scoreboard">
      <span class="badge-pill" id="badgePill">
        <span class="badge-emoji" id="badgeEmoji">🌱</span>
        <span class="badge-name" id="badgeName">새싹</span>
      </span>
      <div class="progress-wrap"><div class="progress" id="progress"></div></div>
      <span class="badge-next" id="badgeNext"></span>

<script>
const WORDS = [{"say": "밤에 일찍 자면 돼.", "chars": ["밤", "에", " ", "일", "찍", " ", "자", "면", " ", "돼"], "accept": ["밤에 일찍 자면 돼.", "밤에일찍자면돼.", "밤에일찍자면돼"]}];
const GOAL = 10;
let curIdx=-1, curTab='say';
const state = WORDS.map(()=>({say:0, write:0, miss:0, sayLog:[]}));  // sayLog: 'o'/'x' 시도 순서별 결과
let attempts=0, correct=0;
let studentName='';

const PRAISE = ['정확해요! 발음이 또렷하네요 👏','완벽해요! 잘하고 있어요 ⭐','훌륭해요! 계속 가볼까요? 🎯','좋아요! 점점 늘고 있어요 💪','최고예요! 자신감이 느껴져요 😊','잘했어요! 노력이 보여요 🌟'];
const ENCOURAGE = ['괜찮아요, 다시 한 번 해봐요 🙂','거의 다 왔어요! 천천히 또박또박 😊','실수해도 괜찮아요. 다시 도전! 💛'];
const ENCOURAGE_HARD = ['천천히 해도 괜찮아요. 먼저 🔊 들어보기를 누르고 똑같이 말해봐요.','조금 어렵죠? 입을 크게 벌리고 또박또박 말해봐요. 잘할 수 있어요!','잘하고 있어요. 한 글자씩 천천히 따라 말해볼까요?'];
function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function showCheer(msg,hint){ const el=document.getElementById('cheer'); el.innerHTML=msg+(hint?('<span class="hint">💡 '+hint+'</span>'):''); el.classList.add('show'); }
function hideCheer(){ document.getElementById('cheer').classList.remove('show'); }

function openNameModal(){ document.getElementById('nameInput').value=studentName; document.getElementById('nameErr').textContent=''; document.getElementById('nameModal').style.display='flex'; }
function saveName(){ const v=document.getElementById('nameInput').value.trim(); if(v.length<1){ document.getElementById('nameErr').textContent='이름을 입력해 주세요.'; return; }
  studentName=v; try{localStorage.setItem('kstep_name',v);}catch(e){} document.getElementById('nameDisplay').textContent=v; document.getElementById('nameModal').style.display='none';
  showCheer(v+'님, 반가워요! 오늘도 즐겁게 공부해요 😊'); setTimeout(hideCheer,2600); }
document.getElementById('nameInput').addEventListener('keydown',e=>{ if(e.key==='Enter') saveName(); });

let koVoice=null;
function pickVoice(){
  const vs=speechSynthesis.getVoices();
  const ko=vs.filter(v=>v.lang&&v.lang.toLowerCase().startsWith('ko'));
  if(!ko.length){ koVoice=null; return; }
  // Sol과 비슷한 '자연스러운 여성 음성' 우선: 애플(Yuna) → 윈도우 SunHi(Natural) → 뉴럴/내추럴 → 구글/삼성 → 기본
  const pref=['yuna','유나','sunhi','선히','natural','neural','online','enhanced','premium','google','samsung','heami','sora','소라'];
  let best=null;
  for(const key of pref){ best=ko.find(v=>(v.name||'').toLowerCase().includes(key)); if(best) break; }
  koVoice=best||ko[0];
}
if('speechSynthesis' in window){ pickVoice(); speechSynthesis.onvoiceschanged=pickVoice; }
function speak(text,rate=0.85,pitch=1){ if(!('speechSynthesis' in window))return; speechSynthesis.cancel(); const u=new SpeechSynthesisUtterance(text); u.lang='ko-KR'; u.rate=rate; u.pitch=pitch; if(koVoice)u.voice=koVoice; speechSynthesis.speak(u); }
function speakCurrent(){ if(curIdx>=0){ var w=WORDS[curIdx]; speak(w.tts||w.say,0.85,w.ttsPitch||1); } }
function speakSlow(){ if(curIdx>=0){ var w=WORDS[curIdx]; speak(w.tts||w.say,0.6,w.ttsPitch||1); } }

const wordsEl=document.getElementById('words');
WORDS.forEach((w,i)=>{ const c=document.createElement('div'); c.className='chip'; c.dataset.i=i;
  c.innerHTML='<span class="ico">🔊</span>'+w.say+'<span class="badge">✓</span>';
  c.onclick=()=>{ speak(w.tts||w.say,0.85,w.ttsPitch||1); selectWord(i); }; wordsEl.appendChild(c); });
function selectWord(i){ curIdx=i; state[i].miss=0;
  document.querySelectorAll('.chip').forEach(c=>c.classList.toggle('active',+c.dataset.i===i));
  document.getElementById('panel').style.display='block';
  document.getElementById('p-title').textContent=WORDS[i].say;
  document.getElementById('p-target').textContent='듣고 → 따라 말하고 → 따라 써요';
  renderReps(); buildPads(); updateVerdict(''); hideCheer();
  document.getElementById('heard').textContent='';
  document.getElementById('panel').scrollIntoView({behavior:'smooth',block:'center'}); }
function switchTab(t){ curTab=t;
  document.getElementById('tab-say').classList.toggle('on',t==='say');
  document.getElementById('tab-write').classList.toggle('on',t==='write');
  document.getElementById('mode-say').style.display=t==='say'?'block':'none';
  document.getElementById('mode-write').style.display=t==='write'?'block':'none';
  var mq=document.getElementById('mode-quiz'); if(mq) mq.style.display=t==='quiz'?'block':'none';
  var tq=document.getElementById('tab-quiz'); if(tq) tq.classList.toggle('on',t==='quiz');
  renderReps(); if(t==='write'){ buildPads(); } if(t==='quiz'){ quizRestart(); } }
function renderReps(){ if(curIdx<0)return; const sd=state[curIdx].say, wd=state[curIdx].write;
  document.getElementById('say-done').textContent=sd; document.getElementById('write-done').textContent=wd;
  // 따라 말하기: 시도 순서대로 성공=초록불, 실패=빨간불
  const log=state[curIdx].sayLog;
  const sayEl=document.getElementById('say-reps'); sayEl.innerHTML='';
  for(let k=1;k<=GOAL;k++){ const d=document.createElement('div'); let cls='rep-dot';
    const r=log[k-1]; if(r==='o') cls+=' done'; else if(r==='x') cls+=' miss';
    d.className=cls; d.textContent=k; sayEl.appendChild(d); }
  // 따라 쓰기: 완성 개수만큼 초록불
  const wEl=document.getElementById('write-reps'); wEl.innerHTML='';
  for(let k=1;k<=GOAL;k++){ const d=document.createElement('div'); d.className='rep-dot'+(k<=wd?' done':''); d.textContent=k; wEl.appendChild(d); }
  document.querySelectorAll('.chip').forEach(c=>{ const idx=+c.dataset.i; c.classList.toggle('cleared',state[idx].say>=GOAL); }); }
/* ---------- 성장 배지 (따라 말하기 성공으로 단계 상승) ---------- */
// 단계: 누적 성공 횟수 기준. 총 5단계.
const BADGES = [
  {at:0,  emoji:'🌱', name:'새싹'},
  {at:5,  emoji:'🌿', name:'잎새'},
  {at:15, emoji:'🌸', name:'꽃봉오리'},
  {at:30, emoji:'🌷', name:'꽃'},
  {at:50, emoji:'🍎', name:'열매'},
];
let badgeLevel=0;
function totalSaySuccess(){ return state.reduce((a,s)=>a+s.say,0); }
function currentBadgeIndex(total){ let idx=0; for(let i=0;i<BADGES.length;i++){ if(total>=BADGES[i].at) idx=i; } return idx; }
function updateBadge(){
  const total=totalSaySuccess();
  const idx=currentBadgeIndex(total);
  document.getElementById('badgeEmoji').textContent=BADGES[idx].emoji;
  document.getElementById('badgeName').textContent=BADGES[idx].name;
  // 다음 단계까지 진행 막대
  const next=BADGES[idx+1];
  if(next){
    const span=next.at-BADGES[idx].at; const got=total-BADGES[idx].at;
    document.getElementById('progress').style.width=Math.min(100,Math.round(got/span*100))+'%';
    document.getElementById('badgeNext').textContent='다음 '+next.emoji+' 까지 '+Math.max(0,next.at-total)+'번';
  } else {
    document.getElementById('progress').style.width='100%';
    document.getElementById('badgeNext').textContent='최고 단계 달성! 🎉';
  }
  // 단계 상승 시 축하
  if(idx>badgeLevel){
    badgeLevel=idx;
    const pill=document.getElementById('badgePill');
    pill.classList.remove('badge-pop'); void pill.offsetWidth; pill.classList.add('badge-pop');
    showToast('🎉 '+(studentName||'')+'님, '+BADGES[idx].emoji+' '+BADGES[idx].name+' 단계가 되었어요!');
    burst();
  }
}

/* ---------- 따라 말하기: 허용 표현 목록으로 채점 ---------- */
const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
let recog=null, recording=false;
function normalize(s){ return (s||'').replace(/\s|[.?!,]/g,''); }
function isMatch(heardAlts, w){
  // 정답으로 인정할 집합: say(원형) + accept 목록, 모두 normalize 후 비교
  const ok = new Set([normalize(w.say), ...w.accept.map(normalize)]);
  return heardAlts.some(a=>ok.has(normalize(a)));
}
function toggleMic(){
  if(curIdx<0)return;
  if(!studentName){ openNameModal(); return; }
  if(!SR){ showToast('이 브라우저는 음성 인식을 지원하지 않아요.\n크롬에서 열어주세요 🙏'); return; }
  if(recording){ recog&&recog.stop(); return; }
  recog=new SR(); recog.lang='ko-KR'; recog.interimResults=false; recog.maxAlternatives=5;
  recording=true; const b=document.getElementById('micBtn'); b.classList.add('rec'); b.textContent='🔴 듣는 중...';
  recog.onresult=(e)=>{

const SVGNS='http://www.w3.org/2000/svg';
function svgEl(tag,attrs){ const e=document.createElementNS(SVGNS,tag); for(const k in attrs) e.setAttribute(k,attrs[k]); return e; }
function buildStrokeGuide(){
  if(curIdx<0) return;
  const row=document.getElementById('stroke-row'); if(!row) return; row.innerHTML='';
  WORDS[curIdx].chars.forEach((ch,ci)=>{
    if(ch.trim()===''){ const sp=document.createElement('div'); sp.className='stroke-space'; row.appendChild(sp); return; }
    const box=document.createElement('div'); box.className='stroke-box';
    const cv=document.createElement('canvas'); cv.width=120; cv.height=120; cv.className='stroke-canvas'; cv.dataset.ch=ch;
    box.appendChild(cv);
    const lbl=document.createElement('div'); lbl.className='lbl'; lbl.textContent=ch;
    box.appendChild(lbl); row.appendChild(box);
    drawMaskChar(cv, ch, -1);  // 시작: 빈 안내선 (곧 애니메이션이 채움)
  });
}
function arrowHead(svg, p1, p2, color){
  const ang=Math.atan2(p2[1]-p1[1], p2[0]-p1[0]); const L=6, w=0.5;
  const a1=[p2[0]-L*Math.cos(ang-w), p2[1]-L*Math.sin(ang-w)];
  const a2=[p2[0]-L*Math.cos(ang+w), p2[1]-L*Math.sin(ang+w)];
  svg.appendChild(svgEl('polygon',{points:`${p2[0]},${p2[1]} ${a1[0]},${a1[1]} ${a2[0]},${a2[1]}`, fill:color}));
}
function badgePos(pts, placed){
  // 시작점에서 진행 반대 방향으로 살짝 밀어 번호를 표시 (겹침 방지)
  let bx=pts[0][0], by=pts[0][1];
  const dx=pts[1][0]-pts[0][0], dy=pts[1][1]-pts[0][1];
  const len=Math.hypot(dx,dy)||1;
  bx -= dx/len*9; by -= dy/len*9;
  // 이미 찍은 번호와 너무 가까우면 한 칸씩 밀어냄
  let guard=0;
  while(placed.some(p=>Math.hypot(p[0]-bx,p[1]-by)<13) && guard<8){
    by -= 11; if(by<8){ by=pts[0][1]+11; bx+=11; } guard++;
  }
  // 박스 안에 유지
  bx=Math.max(9,Math.min(91,bx)); by=Math.max(9,Math.min(91,by));
  placed.push([bx,by]);
  return [bx,by];
}
function drawNumber(svg, n, x, y, color){
  svg.appendChild(svgEl('circle',{cx:x,cy:y,r:7,fill:'#fff',stroke:color,'stroke-width':1.5}));
  const t=svgEl('text',{x:x,y:y+3.5,'text-anchor':'middle','font-size':8,fill:color,'font-weight':'bold'});
  t.textContent=n; svg.appendChild(t);
}
/* 점 배열 → 부드러운 곡선 SVG path (Catmull-Rom → 베지에)
   첫점과 끝점이 같으면 닫힌 곡선(ㅇ 등)으로 매끄럽게 처리 */
function ptsToPath(pts){
  if(pts.length<3){ // 2점이면 직선
    return 'M '+pts.map(p=>p.join(' ')).join(' L ');
  }
  const closed = Math.abs(pts[0][0]-pts[pts.length-1][0])<0.5 && Math.abs(pts[0][1]-pts[pts.length-1][1])<0.5;
  let P = pts.slice();
  if(closed) P = P.slice(0, P.length-1); // 중복 끝점 제거
  const n=P.length;
  const pt=(i)=> closed ? P[(i%n+n)%n] : P[Math.max(0,Math.min(n-1,i))];
  let d='M '+P[0][0]+' '+P[0][1]+' ';
  const last = closed ? n : n-1;
  for(let i=0;i<last;i++){
    const p0=pt(i-1), p1=pt(i), p2=pt(i+1), p3=pt(i+2);
    const c1x=p1[0]+(p2[0]-p0[0])/6, c1y=p1[1]+(p2[1]-p0[1])/6;
    const c2x=p2[0]-(p3[0]-p1[0])/6, c2y=p2[1]-(p3[1]-p1[1])/6;
    d+=`C ${c1x.toFixed(2)} ${c1y.toFixed(2)} ${c2x.toFixed(2)} ${c2y.toFixed(2)} ${p2[0]} ${p2[1]} `;
  }
  if(closed) d+='Z';
  return d;
}

function strokeColor(role){ return role==='c' ? '#f2705c' : '#e2574c'; }
const STROKE_W = 9;  // 붓획 굵기 (명조 느낌)

/* ===== 명조체 마스크 기반 획순 색칠 ===== */
// 획순마다 다른 색 팔레트
const STROKE_PAL=['#3257c8','#28a05a','#dc5a46','#9659c8','#e69628','#28aaaa','#c83c8c','#787828'];
const _maskCache={};  // ch -> {imgData(ImageData of mask), n}
function getMaskData(ch){
  return new Promise(res=>{
    if(_maskCache[ch]){ res(_maskCache[ch]); return; }
    const m=STROKE_MASKS[ch]; if(!m){ res(null); return; }
    const img=new Image();
    img.onload=()=>{
      const c=document.createElement('canvas'); c.width=img.width; c.height=img.height;
      const x=c.getContext('2d'); x.drawImage(img,0,0);
      const data=x.getImageData(0,0,img.width,img.height);
      _maskCache[ch]={data, n:m.n, w:img.width, h:img.height};
      res(_maskCache[ch]);
    };
    img.src='data:image/png;base64,'+m.png;
  });
}
function hexToRgb(h){ return [parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)]; }

// upto: 'all' = 모든 획, 숫자 = 0..upto 까지의 획만 색칠
async function drawMaskChar(cv, ch, upto){
  const md=await getMaskData(ch); const ctx=cv.getContext('2d');
  ctx.clearRect(0,0,cv.width,cv.height);
  if(!md){ return; }
  const {data,n,w,h}=md;
  const maxStroke = (upto==='all') ? n-1 : upto;
  // 배경 명조체(연회색) + 획별 색
  const out=ctx.createImageData(w,h);
  const src=data.data;
  const palRgb=STROKE_PAL.map(hexToRgb);
  for(let i=0;i<w*h;i++){
    const v=src[i*4]; // L 값 = 획 인덱스(0..n-1) 또는 255 배경
    const o=i*4;
    if(v===255){ out.data[o]=out.data[o+1]=out.data[o+2]=0; out.data[o+3]=0; }
    else if(v<=maxStroke){ const c=palRgb[v%palRgb.length]; out.data[o]=c[0]; out.data[o+1]=c[1]; out.data[o+2]=c[2]; out.data[o+3]=235; }
    else { // 아직 안 그린 획 → 연회색 배경
      out.data[o]=229; out.data[o+1]=233; out.data[o+2]=238; out.data[o+3]=255; }
  }
  // 마스크 해상도와 canvas 동일(120) 가정
  if(w===cv.width && h===cv.height){ ctx.putImageData(out,0,0); }
  else { // 스케일 필요 시 임시 캔버스 경유
    const tmp=document.createElement('canvas'); tmp.width=w; tmp.height=h;
    tmp.getContext('2d').putImageData(out,0,0);
    ctx.imageSmoothingEnabled=true; ctx.drawImage(tmp,0,0,cv.width,cv.height);
  }
  // 획 번호 표시 (각 획 영역의 중심에)
  drawStrokeNumbers(ctx, md, maxStroke, cv.width/w);
}

function drawStrokeNumbers(ctx, md, maxStroke, scale){
  const {data,n,w,h}=md; const src=data.data;
  for(let s=0;s<=maxStroke && s<n;s++){
    // 영역 중심(평균 좌표)
    let sx=0,sy=0,cnt=0;
    for(let i=0;i<w*h;i++){ if(src[i*4]===s){ sx+=(i%w); sy+=(i/w|0); cnt++; } }
    if(!cnt) continue;
    const cx=sx/cnt*scale, cy=sy/cnt*scale;
    const col=STROKE_PAL[s%STROKE_PAL.length];
    ctx.beginPath(); ctx.arc(cx,cy,8,0,7); ctx.fillStyle='#fff'; ctx.fill();
    ctx.lineWidth=1.5; ctx.strokeStyle=col; ctx.stroke();
    ctx.fillStyle=col; ctx.font='bold 10px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(String(s+1), cx, cy+0.5);
  }
}

function showStaticGuide(){
  if(!document.getElementById('stroke-row')) return; document.querySelectorAll('#stroke-row canvas').forEach(cv=>drawMaskChar(cv, cv.dataset.ch, 'all'));
}

let animTimer=null;
async function playStrokes(){
  if(animTimer){ clearTimeout(animTimer); animTimer=null; }
  if(!document.getElementById('stroke-row')) return; const cvs=[...document.querySelectorAll('#stroke-row canvas')];
  // 모두 배경(획 0개)으로 초기화
  for(const cv of cvs){ await drawMaskChar(cv, cv.dataset.ch, -1); }
  // 글자별 순차: 각 글자의 획을 하나씩 누적 표시
  let plan=[];
  cvs.forEach(cv=>{ const n=(STROKE_MASKS[cv.dataset.ch]||{}).n||0; for(let s=0;s<n;s++) plan.push({cv,s}); });
  let i=0;
  function step(){
    if(i>=plan.length){ animTimer=null; return; }
    const {cv,s}=plan[i];
    drawMaskChar(cv, cv.dataset.ch, s);  // 0..s 까지 누적
    i++;
    animTimer=setTimeout(step, 260);
  }
  step();
}

const LAST_PAGE = 300;    // 마지막 쪽
// 같은 폴더에 p1.html, p2.html ... 형태로 둘 경우의 주소 규칙.
// (GitHub/Netlify에서 p/49 형태로 둘 거면 pageUrl을 그 규칙으로 바꾸면 됩니다)
function pageUrl(n){ return 'p'+n+'.html'; }
function goPage(dir){
  const target = PAGE + dir;
  if(target < FIRST_PAGE || target > LAST_PAGE) return;
  location.href = pageUrl(target);
}
(function initArrows(){
  const prev=document.getElementById('prevBtn'), next=document.getElementById('nextBtn');
  if(PAGE<=FIRST_PAGE) prev.classList.add('disabled');
  if(PAGE>=LAST_PAGE) next.classList.add('disabled');
})();


/* ========== 이 쪽 QR (인쇄 교재용) ========== */
/* 아래 SITE_BASE 를 본인 GitHub Pages 주소로 바꾸세요.
   예: 'https://USERNAME.github.io/REPO/'  (끝에 슬래시 포함)
   비워두면('') 화면에 QR이 표시되지 않습니다. */
const SITE_BASE = '';

/* ============================================================
   qr-core.js  —  의존성 없는 QR 코드 인코더 (Model 2)
   - 바이트 모드(UTF-8), 오류정정 레벨 M
   - 버전 자동 선택(1~10, URL 길이엔 충분)
   - getModuleCount(), isDark(r,c) 로 결과 비트맵 제공
   공개된 QR 표준(ISO/IEC 18004)에 기반한 표준 구현.
   ============================================================ */
(function (global) {
  'use strict';

  // ---- GF(256) 산술 (생성다항식 0x11d) ----
  var EXP = new Array(256), LOG = new Array(256);
  (function () {
    var x = 1;
    for (var i = 0; i < 255; i++) {
      EXP[i] = x;
      LOG[x] = i;
      x <<= 1;
      if (x & 0x100) x ^= 0x11d;
    }
    for (var j = 255; j < 256; j++) EXP[j] = EXP[j - 255];
  })();
  function gmul(a, b) { if (a === 0 || b === 0) return 0; return EXP[(LOG[a] + LOG[b]) % 255]; }

  // 오류정정 다항식 생성
  function rsPoly(n) {
    var poly = [1];
    for (var i = 0; i < n; i++) {
      var np = new Array(poly.length + 1).fill(0);
      for (var j = 0; j < poly.length; j++) {
        np[j] ^= gmul(poly[j], 1);
        np[j + 1] ^= gmul(poly[j], EXP[i]);
      }
      poly = np;
    }
    return poly;
  }
  function rsEncode(data, ecLen) {
    var gen = rsPoly(ecLen);
    var res = data.concat(new Array(ecLen).fill(0));
    for (var i = 0; i < data.length; i++) {
      var coef = res[i];
      if (coef !== 0) {
        for (var j = 0; j < gen.length; j++) {
          res[i + j] ^= gmul(gen[j], coef);
        }
      }
    }
    return res.slice(data.length);
  }

  // ---- 버전별 용량/배치 데이터 (레벨 M, 버전 1~10) ----
  // [totalCodewords, ecPerBlock, [ [numBlocks, dataCwPerBlock], ... ]]
  var VER_M = {
    1:  [26,  10, [[1,16]]],
    2:  [44,  16, [[1,28]]],
    3:  [70,  26, [[1,44]]],
    4:  [100, 18, [[2,32]]],
    5:  [134, 24, [[2,43]]],
    6:  [172, 16, [[4,27]]],
    7:  [196, 18, [[4,31]]],
    8:  [242, 22, [[2,38],[2,39]]],
    9:  [292, 22, [[3,36],[2,37]]],
    10: [346, 26, [[4,43],[1,44]]]
  };
  function dataCapacityBytes(ver) {
    var info = VER_M[ver];
    var totalData = 0;
    info[2].forEach(function (b) { totalData += b[0] * b[1]; });
    // 바이트모드 헤더: mode(4) + count(8 또는 16) 비트
    var cntBits = ver <= 9 ? 8 : 16;
    return Math.floor((totalData * 8 - 4 - cntBits) / 8);
  }

  // ---- 비트버퍼 ----
  function BitBuf() { this.bits = []; }
  BitBuf.prototype.put = function (num, len) {
    for (var i = len - 1; i >= 0; i--) this.bits.push((num >>> i) & 1);
  };

  function utf8Bytes(str) {
    var out = [];
    for (var i = 0; i < str.length; i++) {
      var c = str.charCodeAt(i);
      if (c < 0x80) out.push(c);
      else if (c < 0x800) { out.push(0xc0 | (c >> 6), 0x80 | (c & 0x3f)); }
      else if (c >= 0xd800 && c <= 0xdbff) {
        var c2 = str.charCodeAt(++i);
        var cp = 0x10000 + ((c & 0x3ff) << 10) + (c2 & 0x3ff);
        out.push(0xf0 | (cp >> 18), 0x80 | ((cp >> 12) & 0x3f), 0x80 | ((cp >> 6) & 0x3f), 0x80 | (cp & 0x3f));
      } else { out.push(0xe0 | (c >> 12), 0x80 | ((c >> 6) & 0x3f), 0x80 | (c & 0x3f)); }
    }
    return out;
  }

  function chooseVersion(byteLen) {
    for (var v = 1; v <= 10; v++) if (dataCapacityBytes(v) >= byteLen) return v;
    throw new Error('데이터가 너무 깁니다(최대 10버전 초과): ' + byteLen + ' bytes');
  }

  // ---- 매트릭스 빌드 ----
  function QR(text) {
    var bytes = utf8Bytes(text);
    var ver = chooseVersion(bytes.length);
    var info = VER_M[ver];
    var ecLen = info[1];
    var blocks = info[2];
    var size = ver * 4 + 17;

    // 1) 비트 데이터 구성
    var bb = new BitBuf();
    bb.put(0x4, 4);                       // 바이트 모드
    bb.put(bytes.length, ver <= 9 ? 8 : 16);
    bytes.forEach(function (b) { bb.put(b, 8); });

    var totalDataCw = 0;
    blocks.forEach(function (b) { totalDataCw += b[0] * b[1]; });
    var capBits = totalDataCw * 8;
    // 종료자
    var rem = capBits - bb.bits.length;
    bb.put(0, Math.min(4, rem));
    // 바이트 정렬
    while (bb.bits.length % 8 !== 0) bb.bits.push(0);
    // 패딩 바이트
    var pads = [0xec, 0x11], pi = 0;
    while (bb.bits.length < capBits) { bb.put(pads[pi], 8); pi ^= 1; }

    // 코드워드 배열
    var dataCw = [];
    for (var i = 0; i < bb.bits.length; i += 8) {
      var v = 0;
      for (var j = 0; j < 8; j++) v = (v << 1) | bb.bits[i + j];
      dataCw.push(v);
    }

    // 2) 블록 분할 + RS
    var dBlocks = [], eBlocks = [];
    var off = 0;
    blocks.forEach(function (b) {
      for (var k = 0; k < b[0]; k++) {
        var d = dataCw.slice(off, off + b[1]); off += b[1];
        dBlocks.push(d);
        eBlocks.push(rsEncode(d, ecLen));
      }
    });
    // 인터리브
    var finalCw = [];
    var maxD = Math.max.apply(null, dBlocks.map(function (d) { return d.length; }));
    for (var c = 0; c < maxD; c++)
      for (var bIdx = 0; bIdx < dBlocks.length; bIdx++)
        if (c < dBlocks[bIdx].length) finalCw.push(dBlocks[bIdx][c]);
    for (var c2 = 0; c2 < ecLen; c2++)
      for (var bIdx2 = 0; bIdx2 < eBlocks.length; bIdx2++)
        finalCw.push(eBlocks[bIdx2][c2]);

    // 3) 모듈 배치
    var modules = [];
    var reserved = [];
    for (var r = 0; r < size; r++) {
      modules.push(new Array(size).fill(null));
      reserved.push(new Array(size).fill(false));
    }
    function setF(r, c, val) { modules[r][c] = val; reserved[r][c] = true; }

    // 파인더 + 분리자
    function finder(r, c) {
      for (var dr = -1; dr <= 7; dr++)
        for (var dc = -1; dc <= 7; dc++) {
          var rr = r + dr, cc = c + dc;
          if (rr < 0 || rr >= size || cc < 0 || cc >= size) continue;
          var on = (dr >= 0 && dr <= 6 && (dc === 0 || dc === 6)) ||
                   (dc >= 0 && dc <= 6 && (dr === 0 || dr === 6)) ||
                   (dr >= 2 && dr <= 4 && dc >= 2 && dc <= 4);
          setF(rr, cc, on);
        }
    }
    finder(0, 0); finder(0, size - 7); finder(size - 7, 0);

    // 타이밍 패턴
    for (var t = 8; t < size - 8; t++) {
      if (!reserved[6][t]) setF(6, t, t % 2 === 0);
      if (!reserved[t][6]) setF(t, 6, t % 2 === 0);
    }

    // 정렬 패턴 (버전 2~10)
    var alignPos = {
      1: [], 2: [6,18], 3: [6,22], 4: [6,26], 5: [6,30],
      6: [6,34], 7: [6,22,38], 8: [6,24,42], 9: [6,26,46], 10:[6,28,50]
    }[ver];
    if (alignPos.length) {
      for (var a1 = 0; a1 < alignPos.length; a1++)
        for (var a2 = 0; a2 < alignPos.length; a2++) {
          var ar = alignPos[a1], ac = alignPos[a2];
          if (reserved[ar][ac]) continue;
          for (var ddr = -2; ddr <= 2; ddr++)
            for (var ddc = -2; ddc <= 2; ddc++) {
              var on2 = Math.max(Math.abs(ddr), Math.abs(ddc)) !== 1;
              setF(ar + ddr, ac + ddc, on2);
            }
        }
    }

    // 다크 모듈
    setF(size - 8, 8, true);

    // 포맷정보 영역 예약
    for (var fr = 0; fr <= 8; fr++) { if (fr !== 6) reserved[fr][8] = true; }
    for (var fc = 0; fc <= 8; fc++) { if (fc !== 6) reserved[8][fc] = true; }
    for (var fr2 = 0; fr2 < 8; fr2++) reserved[size - 1 - fr2][8] = true;
    for (var fc2 = 0; fc2 < 8; fc2++) reserved[8][size - 1 - fc2] = true;

    // 데이터 채우기 (지그재그)
    var dirUp = true, bitIdx = 0;
    var dataBits = [];
    finalCw.forEach(function (cw) { for (var z = 7; z >= 0; z--) dataBits.push((cw >> z) & 1); });

    for (var col = size - 1; col > 0; col -= 2) {
      if (col === 6) col--; // 타이밍 열 건너뜀
      for (var rowStep = 0; rowStep < size; rowStep++) {
        var row = dirUp ? size - 1 - rowStep : rowStep;
        for (var sub = 0; sub < 2; sub++) {
          var cc3 = col - sub;
          if (reserved[row][cc3]) continue;
          var dark = bitIdx < dataBits.length ? dataBits[bitIdx] === 1 : false;
          bitIdx++;
          modules[row][cc3] = dark;
        }
      }
      dirUp = !dirUp;
    }

    // 마스크 선택 (페널티 최소)
    function maskFn(m, r, c) {
      switch (m) {
        case 0: return (r + c) % 2 === 0;
        case 1: return r % 2 === 0;
        case 2: return c % 3 === 0;
        case 3: return (r + c) % 3 === 0;
        case 4: return (Math.floor(r / 2) + Math.floor(c / 3)) % 2 === 0;
        case 5: return ((r * c) % 2) + ((r * c) % 3) === 0;
        case 6: return (((r * c) % 2) + ((r * c) % 3)) % 2 === 0;
        case 7: return (((r + c) % 2) + ((r * c) % 3)) % 2 === 0;
      }
    }
    // BCH 포맷정보 (레벨 M = 0b00)
    function formatBits(mask) {
      var data = (0x00 << 3) | mask; // EC level M=0, mask
      var d = data << 10;
      var g = 0x537;
      for (var b = 14; b >= 10; b--) if ((d >> b) & 1) d ^= g << (b - 10);
      var bits = ((data << 10) | d) ^ 0x5412;
      return bits;
    }
    function placeFormat(mask) {
      var bits = formatBits(mask);
      for (var k2 = 0; k2 < 15; k2++) {
        var bit = ((bits >> k2) & 1) === 1;
        // 위치1
        if (k2 < 6) modules[k2][8] = bit;
        else if (k2 < 8) modules[k2 + 1][8] = bit;
        else if (k2 === 8) modules[8][7] = bit;
        else modules[8][14 - k2] = bit;
        // 위치2
        if (k2 < 8) modules[8][size - 1 - k2] = bit;
        else modules[size - 15 + k2][8] = bit;
      }
    }
    function applyMaskAndScore(mask) {
      var snap = modules.map(function (row) { return row.slice(); });
      for (var r3 = 0; r3 < size; r3++)
        for (var c4 = 0; c4 < size; c4++)
          if (!reserved[r3][c4] && maskFn(mask, r3, c4)) snap[r3][c4] = !snap[r3][c4];
      return snap;
    }
    function penalty(grid) {
      var p = 0, n = size;
      // 규칙1: 연속
      for (var r4 = 0; r4 < n; r4++) {
        var run = 1;
        for (var c5 = 1; c5 < n; c5++) {
          if (grid[r4][c5] === grid[r4][c5 - 1]) { run++; if (run === 5) p += 3; else if (run > 5) p++; }
          else run = 1;
        }
      }
      for (var c6 = 0; c6 < n; c6++) {
        var run2 = 1;
        for (var r5 = 1; r5 < n; r5++) {
          if (grid[r5][c6] === grid[r5 - 1][c6]) { run2++; if (run2 === 5) p += 3; else if (run2 > 5) p++; }
          else run2 = 1;
        }
      }
      // 규칙2: 2x2 블록
      for (var r6 = 0; r6 < n - 1; r6++)
        for (var c7 = 0; c7 < n - 1; c7++) {
          var v = grid[r6][c7];
          if (v === grid[r6][c7 + 1] && v === grid[r6 + 1][c7] && v === grid[r6 + 1][c7 + 1]) p += 3;
        }
      // 규칙3: 어두운비율
      var dark = 0;
      for (var r7 = 0; r7 < n; r7++) for (var c8 = 0; c8 < n; c8++) if (grid[r7][c8]) dark++;
      var ratio = dark / (n * n) * 100;
      p += Math.floor(Math.abs(ratio - 50) / 5) * 10;
      return p;
    }

    var best = null, bestScore = Infinity, bestMask = 0;
    for (var m = 0; m < 8; m++) {
      placeFormat(m);
      var grid = applyMaskAndScore(m);
      // 포맷정보는 마스크 영향 안받게 다시 기록
      var sc = penalty(grid);
      if (sc < bestScore) { bestScore = sc; best = grid; bestMask = m; }
    }
    placeFormat(bestMask);
    // best에는 포맷정보가 마스크 전에 기록됨 → 재배치
    for (var rr2 = 0; rr2 < size; rr2++)
      for (var cc4 = 0; cc4 < size; cc4++)
        if (reserved[rr2][cc4]) best[rr2][cc4] = modules[rr2][cc4];

    this._modules = best;
    this._size = size;
    this.version = ver;
  }
  QR.prototype.getModuleCount = function () { return this._size; };
  QR.prototype.isDark = function (r, c) { return this._modules[r][c] === true; };

  global.QRCore = { create: function (text) { return new QR(text); } };
})(typeof window !== 'undefined' ? window : this);


(function renderPageQR(){
  if(!SITE_BASE) return;
  try{
    const base = SITE_BASE.endsWith('/') ? SITE_BASE : SITE_BASE + '/';
    const url = base + 'p' + PAGE + '.html';
    const qr = QRCore.create(url);
    const n = qr.getModuleCount();
    const scale = 4, quiet = 4;
    const dim = (n + quiet*2) * scale;
    const cv = document.getElementById('pageQrCanvas');
    cv.width = dim; cv.height = dim;
    const ctx = cv.getContext('2d');
    ctx.fillStyle='#fff'; ctx.fillRect(0,0,dim,dim);
    ctx.fillStyle='#000';
    for(let r=0;r<n;r++) for(let c=0;c<n;c++)
      if(qr.isDark(r,c)) ctx.fillRect((c+quiet)*scale,(r+quiet)*scale,scale,scale);
    document.getElementById('pageQrCap').textContent = PAGE + '쪽';
    document.getElementById('pageQr').style.display='block';
  }catch(e){ console.warn('QR 생성 실패:', e); }
})();


var qSelWord=null,qSelPic=null,qMatched=0;
var Q_TOTAL_MATCH=3;
var Q_MC_COUNT=2;
function quizRestart(){
  document.getElementById('qs0').className='qstep on';
  document.getElementById('qs1').className='qstep';
  document.getElementById('qs2').className='qstep';
  document.getElementById('quizMatch').style.display='block';
  document.getElementById('quizMC').style.display='none';
  document.getElementById('mcDone').style.display='none';
  document.getElementById('toMC').style.display='none';
  qSelWord=null;qSelPic=null;qMatched=0;
  var picRow=document.getElementById('picRow');
  var cards=[].slice.call(picRow.querySelectorAll('.mp-card'));
  var order=cards.map(function(_,i){return i;});
  for(var i=order.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=order[i];order[i]=order[j];order[j]=t;}
  order.forEach(function(idx){picRow.appendChild(cards[idx]);});
  document.querySelectorAll('#quizMatch .card').forEach(function(c){c.classList.remove('done','sel','wrong');});
  document.getElementById('quizStatus').textContent='낱말 하나, 그림 하나를 눌러요!';
  for(var k=0;k<Q_MC_COUNT;k++){
    var q=document.getElementById('mcq'+k); if(!q)continue;
    q.style.display='none';
    q.querySelectorAll('.mc-opt').forEach(function(b){b.classList.remove('correct','wrong');b.disabled=false;});
    var fb=document.getElementById('mcfb'+k); if(fb) fb.innerHTML='';
  }
}
function pickCard(el){
  if(el.classList.contains('done'))return;
  var kind=el.dataset.kind;
  if(kind==='word'){
    if(qSelWord)qSelWord.classList.remove('sel');
    if(qSelWord===el){qSelWord=null;el.classList.remove('sel');return;}
    qSelWord=el;el.classList.add('sel');
  }else{
    if(qSelPic)qSelPic.classList.remove('sel');
    if(qSelPic===el){qSelPic=null;el.classList.remove('sel');return;}
    qSelPic=el;el.classList.add('sel');
  }
  if(qSelWord&&qSelPic)qCheck();
}
function qCheck(){
  var w=qSelWord,p=qSelPic,status=document.getElementById('quizStatus');
  if(w.dataset.id===p.dataset.id){
    w.classList.remove('sel');p.classList.remove('sel');
    w.classList.add('done');p.classList.add('done');
    qSelWord=null;qSelPic=null;qMatched++;
    status.textContent='잘했어요! 짝을 맞췄어요 🎉';
    if(qMatched===Q_TOTAL_MATCH){
      status.textContent='짝맞추기 완성! 🎉';
      document.getElementById('qs0').className='qstep cleared';
      document.getElementById('toMC').style.display='block';
    }
  }else{
    w.classList.add('wrong');p.classList.add('wrong');
    status.textContent='앗, 다시 한 번 볼까요? 🤔';
    var ww=w,pp=p;
    setTimeout(function(){ww.classList.remove('wrong','sel');pp.classList.remove('wrong','sel');},500);
    qSelWord=null;qSelPic=null;
  }
}
function goMC(){
  document.getElementById('quizMatch').style.display='none';
  document.getElementById('quizMC').style.display='block';
  showMC(0);
}
function showMC(idx){
  for(var k=0;k<Q_MC_COUNT;k++){var q=document.getElementById('mcq'+k); if(q) q.style.display=(k===idx)?'block':'none';}
  document.getElementById('qs1').className='qstep'+(idx>0?' cleared':' on');
  document.getElementById('qs2').className='qstep'+(idx>1?' cleared':(idx===1?' on':''));
}
function pickMC(btn,qi){
  if(btn.disabled)return;
  var fb=document.getElementById('mcfb'+qi);
  if(btn.dataset.correct==='1'){
    btn.classList.add('correct');
    document.getElementById('mcq'+qi).querySelectorAll('.mc-opt').forEach(function(b){b.disabled=true;});
    fb.innerHTML='<span style="color:#2a8a5a;">정답이에요! 잘했어요 🎉</span>';
    var nextIdx=qi+1;
    if(nextIdx<Q_MC_COUNT){
      var nb=document.createElement('button');nb.className='mc-next';nb.textContent='다음 문제 →';
      nb.onclick=function(){showMC(nextIdx);};
      fb.appendChild(document.createElement('br'));fb.appendChild(nb);
    }else{
      document.getElementById('qs2').className='qstep cleared';
      setTimeout(function(){
        for(var k=0;k<Q_MC_COUNT;k++){var qq=document.getElementById('mcq'+k); if(qq)qq.style.display='none';}
        document.getElementById('mcDone').style.display='block';
      },900);
    }
  }else{
    btn.classList.add('wrong');btn.disabled=true;
    fb.innerHTML='<span style="color:#c0392b;">다시 골라 볼까요? 🤔</span>';
    setTimeout(function(){btn.classList.remove('wrong');btn.disabled=false;},500);
  }
}
